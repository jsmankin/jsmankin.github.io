# ============================================================
# People Data File
# ============================================================
# To add a new person: copy a template entry below and fill in fields.
# To move someone to "former": change group to "former".
# To reorder people within a group: move their entry up or down.
#
# Fields:
#   name        - Full name (required)
#   pronouns    - e.g. "she/her", "he/him", "they/them"
#   group       - "current" or "former" (required)
#   pic         - Path to headshot in /img/ (required)
#   bio         - HTML bio text (required)
#   cv          - Path to CV PDF in /papers/ (optional, omit if none)
#   mail        - Email address (optional)
#   twitter     - Full Twitter/X URL (optional)
#   google      - Full Google Scholar URL (optional)
#   orcid       - Full ORCID URL (optional)
#   researchgate - Full ResearchGate URL (optional)
#   github      - Full GitHub URL (optional)
#   website     - Personal website URL with link text (optional)
#                 Format: { url: "https://...", text: "Name" }
# ============================================================

