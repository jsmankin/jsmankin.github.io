- name: Stella Potemkin
  pronouns: "she/her"
  group: current
  pic: "/img/Stella Headshot.jpg"
  cv: "/papers/StellaPotemkinCV.pdf"
  mail: stella.potemkin.gr@dartmouth.edu
  bio: >
    is a PhD student in <a href="https://graduate.dartmouth.edu/eees/" target="_blank">Dartmouth's
    Ecology, Evolution, Ecosystems, and Society (EEES) program.</a> She's interested in better
    understanding how future climate change can exacerbate economic inequality in the developing world.
    Her work aims to quantify the impact of hydroclimatic extremes, like extreme drought, to inform
    adaptation efforts. Stella is from Colorado and graduated from Rice University in 2023 with a BA in
    <a href="https://eeps.rice.edu/" target="_blank">Earth, Environmental and Planetary Science</a> and
    <a href="https://ga.rice.edu/programs-study/departments-programs/social-sciences/social-policy-analysis/"
    target="_blank">Social Policy Analysis.</a>

- name: Madeleine Burns
  pronouns: "she/her"
  group: current
  pic: "/img/BurnsMadeleine.jpg"
  cv: "/papers/BurnsMadeleine_CV.pdf"
  mail: madeleine.burns.gr@dartmouth.edu
  bio: >
    is a PhD student in <a href="https://graduate.dartmouth.edu/eees/" target="_blank">Dartmouth's
    Ecology, Evolution, Ecosystems, and Society (EEES) program</a>. She is interested in understanding
    and predicting regional hydroclimatic change in the western U.S. Originally from southwest Colorado,
    she also seeks to investigate climate change impacts and adaptation options for western communities.
    Madeleine holds a B.S.E. in <a href="https://cee.princeton.edu/" target="_blank">Environmental
    Engineering from Princeton University</a>, awarded in 2024.

- name: Maggie O'Shea
  pronouns: "she/her"
  group: current
  pic: "/img/moshea_profile.jpeg"
  cv: "/papers/CV_MaggieOShea_2.pdf"
  mail: margaret.oshea.gr@dartmouth.edu
  bio: >
    is a PhD student in <a href="https://sites.dartmouth.edu/EEES/" target="_blank">Dartmouth's
    Ecology, Evolution, Ecosystems, and Society (EEES)</a> program. She is most interested in research
    that helps to quantify the socioeconomic costs of climate impacts through linking climate models with
    tools from economics. Prior to joining Dartmouth, she received her BA in
    <a href="https://www.bates.edu/environment/" target="_blank">Environmental Studies at Bates College</a>
    and received her Masters from <a href="https://nicholas.duke.edu/admissions/duke-environment-masters-degrees"
    target="_blank">Duke University, where she studied Environmental Economics</a>.

- name: Flora Perlmutter
  pronouns: "she/her"
  group: current
  pic: "/img/flora.jpg"
  cv: "/papers/PerlmutterCV9_12_2022.pdf"
  mail: flora.l.perlmutter.gr@dartmouth.edu
  bio: >
    is a PhD student in the Climate Modeling & Impacts Group, interested in large scale hydroclimate
    and its response with climate change. She is interested in using her findings to help inform
    adaptation efforts. Flora is from California and holds a BA in
    <a href="https://eps.wustl.edu/biogeochemistry-and-organic-geochemistry" target="_blank">Geochemistry
    and Environmental Biology from Washington University in St. Louis</a>, awarded in 2022.

- name: Dr. Robert Fofrich
  pronouns: "he/him"
  group: current
  pic: "/img/Picture1.jpg"
  cv: "/papers/rfofrich CV.pdf"
  mail: Robert.A.Fofrich@dartmouth.edu
  bio: >
    is a postdoctoral scholar in the Climate Modeling & Impacts Group. His research focuses on
    decarbonization and the attribution of climate-related damages. He earned his PhD in
    <a href="https://www.ess.uci.edu/" target="_blank">Earth System Science from the University of
    California, Irvine,</a> where he researched climate change mitigation and adaptation efforts with
    a focus on energy and agricultural systems. He was previously a
    <a href="https://ppfp.ucop.edu/info/" target="_blank">University of California President's
    Postdoctoral Fellow</a> at the <a href="https://www.ioes.ucla.edu/" target="_blank">University of
    California, Los Angeles,</a> and has also held research appointments with the
    <a href="https://impactlab.org/" target="_blank">Climate Impact Lab</a> at
    <a href="https://earthscipol.net/" target="_blank">Rutgers University</a> and as an undergraduate
    at <a href="https://climatesciences.jpl.nasa.gov/" target="_blank">NASA's Jet Propulsion Laboratory.</a>

- name: Dr. Alex Gottlieb
  pronouns: "he/him"
  group: current
  pic: "/img/gottlieb_headshot.jpg"
  cv: "/papers/Gottlieb_CV_Jan22.pdf"
  mail: Alexander.Reid.Gottlieb@dartmouth.edu
  bio: >
    is a postdoctoral scholar in CMIG. He recieved his PhD in
    <a href="https://sites.dartmouth.edu/EEES/" target="_blank">Dartmouth's Ecology, Evolution,
    Ecosystems, and Society (EEES) program in September 2025</a>. His research focuses on understanding
    how changes to the form, frequency, and intensity of precipitation in a warming climate interact
    with processes at the land surface to shape water availability for people and ecosystems. His current
    efforts focus on end-to-end attribution of flood damages.</p> <p>He's from Pittsburgh, Pennsylvania
    and graduated from <a href="https://politics.princeton.edu/" target="_blank">Princeton University in
    2018 with a BA in Politics</a> and certificates in
    <a href="https://csml.princeton.edu/undergraduates/certificate-program" target="_blank">Computer
    Science, Statistics and Machine Learning</a>.

- name: Justin Mankin
  pronouns: "he/him"
  group: current
  pic: "/img/IMG2.jpg"
  cv: "/papers/Mankin_short_CV.pdf"
  mail: mankin@dartmouth.edu
  twitter: "http://twitter.com/jsmankin"
  google: "https://scholar.google.com/citations?user=jpm35hwAAAAJ&hl=en&oi=ao"
  orcid: "http://www.orcid.org/0000-0003-2520-4555"
  researchgate: "http://www.researchgate.net/profile/Justin_Mankin"
  github: "http://github.com/jsmankin"
  bio: >
    is a climate scientist, associate professor in the
    <a href="http://geography.dartmouth.edu/people/justin-s-mankin" target="_blank">Department of
    Geography</a> at <a href="http://dartmouth.edu" target="_blank">Dartmouth College</a>, and PI of the
    Dartmouth Climate Modeling & Impacts Group. He also holds courtesy appointments in
    <a href="https://earthsciences.dartmouth.edu/" target="_blank">the Department of Earth & Planetary
    Sciences (EAPS)</a> and <a href="http://sites.dartmouth.edu/EEES/" target="_blank">the Ecology,
    Evolution, Environment, & Society (EEES) graduate program</a>, and is an Adjunct Research Scientist
    in the <a href="https://www.ldeo.columbia.edu/research/ocean-climate-physics" target="_blank">Division
    of Ocean & Climate Physics at Lamont-Doherty Earth Observatory of Columbia University</a>. His
    interdisciplinary research constrains the uncertainty essential to understanding and responding to
    climate change's impacts on people and ecosystems. He is a former co-lead of the
    <a href="https://cpo.noaa.gov/Meet-the-Divisions/Earth-System-Science-and-Modeling/MAPP/MAPP-Task-Forces/Drought-Task-Force4"
    target="_blank">NOAA Drought Task Force</a>, is a current NCA6 Graphics Lead Author, and is an Editor
    for <a href="https://agupubs.onlinelibrary.wiley.com/journal/23284277" target="_blank">AGU's Earth's
    Future</a> and <a href="https://www.ametsoc.org/index.cfm/ams/publications/journals/journal-of-climate/"
    target="_blank">AMS's Journal of Climate</a>.</p>
    <p>His previous career was as an intelligence officer working in South Asia and the Middle East. He's
    from Vermont, did his postdoctoral training at Lamont-Doherty Earth Observatory of Columbia University
    and NASA's Goddard Institute for Space Studies, and holds degrees from Columbia (BA, MPA), the London
    School of Economics (MSc), and Stanford (PhD).

