- name: Dr. Ethan Coffel
  group: former
  pic: "/img/coffel_pic.jpg"
  cv: "/papers/coffel-cv.pdf"
  mail: Ethan.D.Coffel@dartmouth.edu
  google: "https://scholar.google.com/citations?user=_l8-k3MAAAAJ&hl=en"
  researchgate: "https://www.researchgate.net/profile/Ethan_Coffel"
  website:
    url: "http://www.ethancoffel.com"
    text: "Ethan"
  bio: >
    is a former <a href="http://neukom.dartmouth.edu/programs/neukom_fellows_app.html"
    target="_blank">Neukom Postdoctoral Fellow</a> in the Climate Modeling & Impacts Group. Ethan
    studies how climate change is affecting extreme weather and how to quantify the impacts of these
    changes on human societies and natural ecosystems. He strives to understand the physical mechanisms
    driving changes in the climate and to clearly communicate climate change projections and their
    uncertainty.</p> <p>He's from Iowa, has a BA from <a href="https://www.northwestern.edu/"
    target="_blank">Northwestern University</a>, and received his PhD from
    <a href="http://eesc.columbia.edu/" target="_blank">Columbia University</a>, where he studied
    extreme heat and its impacts on human health and infrastructure. Ethan is now an assistant professor
    of geography at Syracuse University.

- name: Dr. Yaqian He
  group: former
  pic: "/img/YH.jpg"
  cv: "/papers/CV_Yaqian.pdf"
  mail: yaqian.he@dartmouth.edu
  website:
    url: "https://yaqianhe.wordpress.com/"
    text: "Yaqian"
  bio: >
    is a former Postdoctoral Research Fellow in the Climate Modeling & Impacts Group.
    She uses remote sensing, statistics, and climate science to explore the effects of human-induced
    land use and land cover changes on monsoon climates, including the West Africa monsoon and the
    East Asia monsoon. In particular, she applies remote sensing to classify the land surface and
    statistical and climate models to examine the underlying physical mechanisms. Yaqian is now an
    assistant professor of geography at the University of Central Arkansas.</p>
    <p>Yaqian holds a Bachelors in Survey Engineering from <a href="http://eng.cumt.edu.cn/"
    target="_blank">China University of Mining and Technology</a>, an M.S. in Cartography and GIS
    from the School of Geography at <a href="http://geo.english.bnu.edu.cn/" target="_blank">Beijing
    Normal University, China,</a> and a PhD from the <a href="http://pages.geo.wvu.edu/~elee/"
    target="_blank">Climatology Lab in the Department of Geography at West Virginia University</a>.

- name: Marnee Singh
  pronouns: "they/them"
  group: former
  pic: "/img/Harry.jpg"
  mail: harmanveer.singh@stonybrook.edu
  bio: >
    was a researcher in the Climate Modeling & Impacts Group, interested in analyzing the overlying
    meteorology during drought events. Marnee's previous research experience includes observing
    free-tropospheric ozone trends over Northern California and analyzing the relationship between
    high-ozone events aloft and corresponding surface-level conditions. Marnee is from New York City
    and holds a BA from <a href="http://eesc.columbia.edu/" target="_blank">Columbia University</a>.
    Marnee is now a PhD student in the <a href="https://you.stonybrook.edu/kareed/"
    target="_blank">Climate Extremes Modeling (CEM) Group at Stony Brook University</a>.

- name: Emily Martinez
  pronouns: "she/her"
  group: former
  pic: "/img/Emily.png"
  mail: Emily.D.Martinez.21@dartmouth.edu
  bio: >
    is a former undergraduate researcher in CMIG. She earned a BE in
    <a href="https://engineering.dartmouth.edu/academics/undergraduate/ab/modified/environmental">Environmental
    Engineering</a> from Thayer School of Engineering at Dartmouth. She is originally from Bell,
    California and it was her upbringing in the LA County that ultimately influenced her interest in
    the environment. She has research experience analyzing the environmental impacts of microplastics
    in polar regions as well as conducting Life Cycle Assessments for commercial products. Emily has
    since developed a passion for understanding climate change and the impact air pollution has on the
    environment. Outside of academics, she was a part of the
    <a href="https://www.dartmouth.edu/~triathlon/?DB_OEM_ID=11610#page-top">Dartmouth Triathlon
    Team</a> and competes in both short and long-distance triathlons.

- name: Dr. Zhiying Li
  pronouns: "she/her"
  group: former
  pic: "/img/AVATAR_Zhiying.jpg"
  cv: "/papers/Zhiying Li_CV_public_v2.pdf"
  mail: Zhiying.Li@dartmouth.edu
  website:
    url: "https://zhiyingli-geo.com/"
    text: "Zhiying"
  bio: >
    is a former Postdoctoral Research Fellow in Dartmouth's Climate Modeling & Impacts Group. She works
    to understand the variability, drivers, and impacts of hydroclimatic extremes, such as drought and
    flooding, and water availability in a warming climate, using a wide range of approaches, including
    fully coupled Earth System Models, process-based hydrologic models, hydrologic theory, statistical
    analysis, and GIS. Her most recent project is about drought monitoring in a nonstationary climate
    in the contiguous U.S. Zhiying is now an assistant professor at the
    <a href="https://oneill.indiana.edu/faculty-research/directory/profiles/faculty/full-time/li-zhiying.html"
    target="_blank">O'Neill School of Public and Environmental Affairs at Indiana University
    Bloomington</a>.</p> <p>Zhiying Li holds a Bachelors in Soil and Water Conservation from
    <a href="https://en.nwsuaf.edu.cn/">Northwest A&F University</a>, China, an M.S. in Physical
    Geography from the <a href="https://english.ucas.ac.cn/">University of Chinese Academy of
    Sciences</a>, China, and a Ph.D. from the <a href="https://geography.osu.edu/">Department of
    Geography at The Ohio State University</a>. She recently won The Story Exchange's
    <a href="https://thestoryexchange.org/announcing-winners-women-in-science-incentive-prize/">Women
    in Science Prize</a>.

- name: Noel Siegert
  pronouns: "he/him"
  group: former
  pic: "/img/SIEGERT_NOEL.jpg"
  mail: Noel.Van.Antwerp.Siegert@dartmouth.edu
  bio: >
    is a former research assistant in the Dartmouth Climate Modeling & Impacts group. Primarily
    interested in the intersection between climate, migration, and human development, previous research
    involvements include studying robust decision-making approaches to water resource management. In his
    free time, he enjoys playing the trumpet and spending time outside. He is from Ipswich,
    Massachusetts and graduated from Dartmouth College in 2021 where he studied Geography, Spanish, and
    Economics. He is currently a PhD student at
    <a href="https://eesc.columbia.edu/" target="_blank">Columbia University</a>.

- name: Grace Bryant
  pronouns: "she/her"
  group: former
  pic: "/img/IMG-3411.jpg"
  mail: grace.a.bryant.23@dartmouth.edu
  bio: >
    will graduate from Dartmouth College with a degree in Earth Science. She is interested in the
    impact of climate change on global human health. She completed her Senior Earth Sciences thesis
    project with the Climate Modeling & Impacts Group to investigate the effects of snow drought on
    wildfire activity in the western United States. In her free time she loves to ski, backpack and
    bake cookies.

- name: Dr. Christopher Callahan
  pronouns: "he/him"
  group: former
  pic: "/img/callahan_headshot.jpg"
  cv: "/papers/CV_Christopher_Callahan.pdf"
  mail: Christopher.W.Callahan.GR@dartmouth.edu
  twitter: "https://twitter.com/cwcallahan45"
  google: "https://scholar.google.com/citations?user=iDJmH2cAAAAJ&hl=en"
  github: "https://github.com/ccallahan45"
  website:
    url: "https://ccallahan45.github.io/"
    text: "Chris"
  bio: >
    graduated with his PhD from <a href="https://sites.dartmouth.edu/EEES/" target="_blank">Dartmouth's
    Ecology, Evolution, Ecosystems, and Society (EEES) program in August 2023</a>. His National Science
    Foundation Graduate Research Fellowship-funded research focused socioeconomic impacts of global
    warming, combining climate models and empirical methods to understand the economic impacts of hazards
    like heat waves and El Niño events.</p> <p>He's from the suburbs of Chicago, and he graduated from
    <a href="https://www.envsci.northwestern.edu/" target="_blank">Northwestern University</a> in 2018
    with a BA in Environmental Science, where he also led Northwestern's award-winning debate team and
    collaborated with researchers at the University of Chicago. He is currently a postdoctoral fellow at
    Stanford University.

- name: Katya Pronichenko
  pronouns: "she/her"
  group: former
  pic: "/img/katya.png"
  mail: katya.pronichenko.23@dartmouth.edu
  bio: >
    is a former Geography and Environmental Science major at Dartmouth College who graduated in 2023.
    While part of CMIG, Katya investigated how different climate models represent post-wildfire
    regrowth, and wildfire's implications for drought and water availability. When she is not working,
    Katya loves to spend time in nature. One of her favorite pastimes is paragliding and appreciating
    the grand scale of the Earth's natural wonders. She is currently an energy supply chain analyst at
    Wood Mackenzie in San Francisco.

- name: Erica Simon
  pronouns: "she/her"
  group: former
  pic: "/img/Erica_Simon.jpg"
  mail: erica.l.simon.25@dartmouth.edu
  bio: >
    studied Computer Science and Geography at Dartmouth College. She was a
    <a href="https://neukom.dartmouth.edu/funding/students/neukom-scholars-program"
    target="_blank">Neukom Scholar</a> in the Climate Modeling & Impacts group, where she worked to
    assess projections of plant growth in the American West and its implications for future water
    availability. In her free time, Erica enjoys exploring Pine Park, playing lacrosse, and hiking.

- name: Dr. Corey Lesk
  pronouns: "he/him"
  group: former
  pic: "/img/lesk_headshot.png"
  cv: "/papers/CoreyLesk_CV_2022.pdf"
  mail: Corey.S.Lesk@dartmouth.edu
  google: "https://scholar.google.com/citations?user=2mx-kUcAAAAJ&hl=en&oi=ao"
  bio: >
    was a <a href="https://neukom.dartmouth.edu/funding/faculty/postdoctoral-fellows"
    target="_blank">Neukom Postdoctoral Fellow</a> and a
    <a href="https://frq.gouv.qc.ca/en/program/scholarships-2nd-and-3rd-cycle-2022-2023/"
    target="_blank">Fonds de recherche du Québec – Nature et technologies (FRQNT) Fellow</a> in the
    Climate Modeling & Impacts Group. He is an environmental scientist interested in climate change
    and its impacts on people and nature. During his PhD at <a href="https://eesc.columbia.edu/"
    target="_blank">Columbia University</a>, he studied how weather has affected food crops
    historically, drawing lessons to help adapt agriculture to a more extreme climate. He also
    assessed the greenhouse gas emissions likely to result from the climate transition. Corey is
    investigating how rising atmospheric carbon dioxide may change how crops and natural vegetation
    interact with climate extremes. His research integrates diverse observational data with biophysical
    and statistical models. Corey is also an enthusiastic environmental and climate educator.
